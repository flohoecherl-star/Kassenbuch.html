<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kassenbuch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10141A;
    --panel:#1A2029;
    --panel-alt:#212934;
    --paper:#ECE6D6;
    --ink:#D8DCE2;
    --muted:#8B94A3;
    --pos:#4E9C7C;
    --neg:#B5533C;
    --gold:#C9A227;
    --line:#2A323D;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 64px;}
  h1,h2,h3{font-family:'Fraunces', serif;font-weight:600;margin:0;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
  .topbar h1{font-size:22px;}
  .topbar .sub{font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--muted);}

  /* Ticket */
  .ticket{
    background:var(--panel);
    border-radius:var(--radius);
    padding:22px 22px 0;
    position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset;
  }
  .ticket-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .month-nav{display:flex;align-items:center;gap:10px;}
  .month-nav button{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;line-height:1;
  }
  .month-nav button:hover{border-color:var(--gold);}
  .month-nav .month-label{font-family:'Fraunces',serif;font-size:18px;min-width:150px;text-align:center;}
  .ticket-figures{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:6px 0 20px;}
  .fig{text-align:center;}
  .fig .eyebrow{margin-bottom:4px;}
  .fig .num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;}
  .fig.balance .num.pos{color:var(--pos);}
  .fig.balance .num.neg{color:var(--neg);}
  .perf{
    height:14px;margin:0 -22px;
    background: radial-gradient(circle at 7px 7px, var(--bg) 7px, transparent 7.5px) repeat-x;
    background-size:16px 14px;
  }

  /* sections */
  .card{background:var(--panel);border-radius:var(--radius);padding:18px 20px;margin-top:16px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-head h2{font-size:16px;}
  .hint{font-size:12px;color:var(--muted);margin-top:2px;}
  .add-btn{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .add-btn:hover{border-color:var(--gold);}

  table{width:100%;border-collapse:collapse;}
  tr.row{border-top:1px solid var(--line);}
  tr.row:first-child{border-top:none;}
  td{padding:9px 4px;vertical-align:middle;}
  td.amount{font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;}
  td.name-cell input, td.amount input, .addline input, .addline select{
    background:transparent;border:none;color:var(--ink);font-family:inherit;font-size:13.5px;
    width:100%;padding:4px 2px;border-radius:6px;
  }
  td.name-cell input:hover, td.amount input:hover{background:var(--panel-alt);}
  td.name-cell input:focus, td.amount input:focus{background:var(--panel-alt);outline:1px solid var(--gold);}
  .note{font-size:11px;color:var(--muted);display:block;}
  .chip{
    display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
    font-family:'IBM Plex Mono',monospace;white-space:nowrap;
  }
  .del-btn{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;
  }
  .del-btn:hover{color:var(--neg);}
  .sum-row td{padding-top:12px;border-top:1px solid var(--line);font-weight:600;}

  .addline{
    display:grid;grid-template-columns:100px 1fr 130px 90px 32px;gap:6px;
    background:var(--panel-alt);border-radius:8px;padding:6px 8px;margin-top:10px;align-items:center;
  }
  .addline select{cursor:pointer;}
  .addline button{
    background:var(--gold);border:none;color:#1A1503;font-weight:600;border-radius:6px;
    height:28px;cursor:pointer;font-size:14px;
  }
  .addline.acc{grid-template-columns:1fr 150px 90px 32px;}
  @media(max-width:520px){
    .addline, .addline.acc{grid-template-columns:1fr 1fr;}
    .addline button{grid-column:span 2;}
  }

  .catbar-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px;}
  .catbar-row .label{width:150px;flex-shrink:0;color:var(--muted);}
  .catbar-track{flex:1;height:8px;background:var(--panel-alt);border-radius:6px;overflow:hidden;}
  .catbar-fill{height:100%;border-radius:6px;}
  .catbar-row .val{font-family:'IBM Plex Mono',monospace;width:70px;text-align:right;flex-shrink:0;}

  .trend{display:flex;align-items:flex-end;gap:10px;height:110px;margin-top:8px;}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .trend .bar{width:60%;border-radius:4px 4px 0 0;min-height:2px;}
  .trend .m-label{font-size:10px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace;}

  .callout{
    border:1px solid var(--gold);border-radius:8px;padding:12px 14px;margin-top:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .callout .t{font-size:13px;}
  .callout .t b{color:var(--gold);}
  .callout .figs{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);}

  details.settings{margin-top:20px;}
  details.settings summary{cursor:pointer;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;}
  details.settings .card{margin-top:10px;}

  ::selection{background:var(--gold);color:#1A1503;}
  a{color:var(--gold);}
  button:focus-visible, input:focus-visible, select:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important;} }

  /* Gruppierte Fixkosten */
  tr.group-row td{
    padding:12px 4px 5px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--muted);
  }
  tr.group-row td.amount{font-size:12px;color:var(--ink);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:1px;}

  /* Kleinunternehmen */
  .biz-flow{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;}
  .biz-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13.5px;}
  .biz-line .amount-txt{font-family:'IBM Plex Mono',monospace;}
  .biz-line.result{border-top:1px solid var(--line);margin-top:6px;padding-top:10px;font-weight:600;}
  .biz-line.result .amount-txt{color:var(--gold);font-size:16px;}
  .inline-num{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    width:52px;padding:2px 6px;border-radius:6px;font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;text-align:right;
  }
  .inline-num:focus{outline:1px solid var(--gold);}

  /* Überschuss verteilen */
  .prog-wrap{margin:10px 0 4px;}
  .prog-track{height:10px;background:var(--panel-alt);border-radius:6px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--pos);border-radius:6px;transition:width .3s ease;}
  .prog-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:5px;font-family:'IBM Plex Mono',monospace;}
  .split-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line);font-size:13.5px;}
  .split-row:first-of-type{border-top:none;}
  .split-row .left{display:flex;align-items:center;gap:8px;}
  .split-row .euro{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .split-hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
  .split-hint b{color:var(--gold);font-weight:600;}

  @media(max-width:600px){
    table, tbody{display:block;width:100%;}
    tbody tr{display:grid;align-items:center;column-gap:6px;}
    tbody td{display:block;width:auto !important;padding:3px 2px;}
    /* Fixkosten: Name in voller Breite, darunter Kategorie + Betrag */
    tr[data-kind="fixed"]{grid-template-columns:1fr 96px 28px;}
    tr[data-kind="fixed"] td.name-cell{grid-column:1 / -1;}
    /* Bewegungen: Datum + Name oben, Kategorie + Betrag darunter */
    tr[data-kind="tx"]{grid-template-columns:112px 1fr 96px 28px;}
    tr[data-kind="tx"] td.name-cell{grid-column:2 / -1;}
    tr[data-kind="tx"] td.amount{grid-column:3;}
    /* Einzeiler */
    tr[data-kind="income"], tr[data-kind="account"], tr.group-row, tr.sum-row{grid-template-columns:1fr 96px 28px;}
    tr[data-kind="biz"]{grid-template-columns:112px 1fr 96px 28px;}
    td select{font-size:12px;}
    tr.row{padding:4px 0;}
  }

  .fade-in{animation:fadeIn .35s ease both;}

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* Backup-Buttons */
  .backup-btns{display:flex;gap:6px;}
  .backup-btns .add-btn{padding:5px 9px;font-size:12px;}

  /* KPI-Strip unter dem Beleg */
  .kpi-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;}
  .kpi{background:var(--panel);border-radius:var(--radius);padding:12px 10px;text-align:center;}
  .kpi .eyebrow{display:block;margin-bottom:5px;}
  .kpi b{font-family:'IBM Plex Mono',monospace;font-size:17px;display:block;}
  .kpi b.pos{color:var(--pos);} .kpi b.neg{color:var(--neg);}
  .kpi .kpi-note{font-size:10.5px;color:var(--muted);}

  /* Aufklappbare Gruppen */
  tr.group-row.toggle{cursor:pointer;}
  tr.group-row.toggle:hover td{color:var(--ink);}
  .caret{display:inline-block;width:12px;color:var(--muted);font-size:10px;}
  .grp-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);opacity:.7;}
  .due-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);margin-left:6px;}
  .due-now{color:var(--gold);}

  /* Intervall- & Fälligkeits-Selects */
  .iv-sel{background:var(--panel-alt);border:1px solid var(--line);color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;border-radius:5px;padding:2px 3px;margin-top:3px;width:100%;cursor:pointer;}
  .iv-sel:focus{outline:1px solid var(--gold);}
  .anchor-sel{background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    font-size:10.5px;border-radius:5px;padding:1px 2px;cursor:pointer;}
  td.amount{position:relative;}

  /* Scope (Gemeinsam/Privat) */
  .scope-wrap{display:inline-flex;gap:4px;margin-top:4px;}
  .scope-sel, .who-sel{background:var(--panel-alt);border:1px solid var(--line);color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:10px;border-radius:5px;padding:1px 4px;cursor:pointer;}
  .scope-sel.gemeinsam{color:var(--gold);border-color:rgba(201,162,39,.4);}
  .scope-sel:focus, .who-sel:focus{outline:1px solid var(--gold);}

  /* Paar-Aufteilung */
  .name-inline{background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    font-family:inherit;font-size:13.5px;border-radius:6px;padding:1px 6px;width:90px;}
  .name-inline:focus{outline:1px solid var(--gold);}
  .pair-head{font-size:12.5px;font-weight:600;color:var(--ink);margin:16px 0 4px;}
  .pair-grid{display:grid;grid-template-columns:1fr auto auto;gap:5px 16px;font-size:13.5px;align-items:baseline;}
  .pair-grid .h{color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:right;text-transform:uppercase;letter-spacing:.05em;}
  .pair-grid .v{font-family:'IBM Plex Mono',monospace;text-align:right;}
  .pair-grid .v.neg{color:var(--neg);}
  .pair-grid .tot{border-top:1px solid var(--line);padding-top:6px;margin-top:2px;font-weight:600;}

  /* Kommende Fälligkeiten */
  .trend .up-val{font-size:9px;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;}

  /* Sparziele */
  .goal{padding:10px 0;border-top:1px solid var(--line);}
  .goal:first-of-type{border-top:none;}
  .goal-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .goal-name{flex:1;background:transparent;border:none;color:var(--ink);font-family:inherit;font-size:14px;font-weight:500;padding:2px;border-radius:6px;}
  .goal-name:hover{background:var(--panel-alt);}
  .goal-name:focus{background:var(--panel-alt);outline:1px solid var(--gold);}
  .goal-pct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);}
  .goal-meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:6px;font-size:12px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .goal-meta .inline-num{width:70px;}

  /* Finanz-Check */
  .check-list{display:flex;flex-direction:column;gap:2px;}
  .check-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);}
  .check-row:first-child{border-top:none;}
  .check-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .check-label{font-size:13.5px;width:130px;flex-shrink:0;}
  .check-txt{font-size:12.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  @media(max-width:520px){ .check-label{width:108px;} .check-txt{font-size:11.5px;} }

  /* Tabs */
  .tabbar{position:sticky;top:0;z-index:20;display:flex;gap:4px;padding:8px 0 10px;margin-bottom:6px;
    background:linear-gradient(to bottom, var(--bg) 82%, transparent);}
  .tab{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    font-family:inherit;font-size:13px;padding:8px 4px;border-radius:9px;cursor:pointer;transition:all .15s;}
  .tab:hover{color:var(--ink);}
  .tab.active{background:var(--panel-alt);color:var(--ink);border-color:var(--gold);font-weight:600;}

  /* Nur Inhalte des aktiven Tabs anzeigen */
  #app [data-tab]{display:none;}
  #app[data-active-tab="monat"] [data-tab="monat"],
  #app[data-active-tab="paar"] [data-tab="paar"],
  #app[data-active-tab="sparen"] [data-tab="sparen"],
  #app[data-active-tab="auswertung"] [data-tab="auswertung"]{display:block;}
  #app[data-active-tab="monat"] .kpi-strip[data-tab="monat"]{display:grid;}
</style>
</head>
<body>
<div class="wrap" id="app">Lade…</div>

<script>
const CATEGORY_DEFAULTS = [
  {id:'wohnen', label:'Wohnen', color:'#5C7A99', budget:0},
  {id:'versicherung', label:'Versicherung', color:'#7A6C9E', budget:0},
  {id:'auto', label:'Auto', color:'#4F7A8C', budget:0},
  {id:'freizeit', label:'Freizeit', color:'#C9A227', budget:0},
  {id:'trading', label:'Trading/Datenfeed', color:'#4E9C7C', budget:0},
  {id:'challenge', label:'Challenges', color:'#B5533C', budget:100},
  {id:'spontan', label:'Kleinausgaben/Spontan', color:'#D08A52', budget:150},
  {id:'sonstiges', label:'Sonstiges', color:'#8B94A3', budget:0}
];

function defaultFixedCosts(){
  // amount = Betrag PRO Intervall. interval: 'monat'|'quartal'|'jahr'. anchor = Fälligkeitsmonat (1–12).
  // scope: 'gemeinsam' | 'privat'. who: 'ich' | 'sophie' (nur bei privat relevant).
  return [
    {id:uid(), label:'Miete', category:'wohnen', amount:1300, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Private Krankenversicherung (inkl. Dienstunfähigkeit)', category:'versicherung', amount:501, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Leasing Auto', category:'auto', amount:430, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Haushaltskonto', category:'wohnen', amount:650, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Strom', category:'wohnen', amount:45, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Unfallversicherung', category:'versicherung', amount:24, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Rundfunkbeitrag', category:'wohnen', amount:55, interval:'quartal', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Privathaftpflicht', category:'versicherung', amount:78, interval:'jahr', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Rechtsschutzversicherung', category:'versicherung', amount:160.75, interval:'jahr', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Hausratversicherung', category:'versicherung', amount:170, interval:'jahr', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'CrossFit', category:'freizeit', amount:135, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Trainingsprogramm', category:'freizeit', amount:100, interval:'quartal', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Datafeed Trading', category:'trading', amount:42, interval:'monat', anchor:1, scope:'privat', who:'ich', note:'~46 $ / Monat'},
    {id:uid(), label:'Sky TV', category:'freizeit', amount:53, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Netflix', category:'freizeit', amount:5, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'YouTube Premium', category:'freizeit', amount:22, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'},
    {id:uid(), label:'Cloud', category:'freizeit', amount:3, interval:'monat', anchor:1, scope:'privat', who:'ich'},
    {id:uid(), label:'Anschaffungen & Urlaub', category:'sonstiges', amount:200, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich', note:'Rücklage'},
    {id:uid(), label:'Sprit', category:'auto', amount:250, interval:'monat', anchor:1, scope:'privat', who:'ich', note:'ca. 2–300 € / Monat'},
    {id:uid(), label:'Autowartung', category:'auto', amount:42.50, interval:'monat', anchor:1, scope:'privat', who:'ich', note:'Rücklage · ~510 €/Jahr'}
  ];
}
function defaultSettings(){
  return {
    fixedCosts: defaultFixedCosts(),
    categories: CATEGORY_DEFAULTS,
    bizTaxRate: 40,
    invest: { ziel: 12000, stand: 0, splitNotgroschen: 50, splitEtf: 40, splitFrei: 10 },
    household: { partnerName: 'Sophie', incomeB: 0 },
    goals: [
      {id:uid(), label:'Notgroschen', target:15000, current:0, monthly:300},
      {id:uid(), label:'Baby-Erstausstattung', target:2000, current:0, monthly:150},
      {id:uid(), label:'Urlaub', target:2500, current:0, monthly:200}
    ]
  };
}
function defaultMonth(){
  return {
    income:[
      {id:uid(), label:'Gehalt (netto)', amount:3700, person:'ich'},
      {id:uid(), label:'Mietanteil Sophie', amount:550, person:'sophie'}
    ],
    transactions:[],
    business:[]
  };
}

function uid(){ return Math.random().toString(36).slice(2,9); }
function eur(n){ return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0); }
function monthLabel(key){
  const [y,m]=key.split('-').map(Number);
  const names=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${names[m-1]} ${y}`;
}
function shiftMonth(key,delta){
  let [y,m]=key.split('-').map(Number);
  m+=delta;
  while(m<1){m+=12;y--;}
  while(m>12){m-=12;y++;}
  return `${y}-${String(m).padStart(2,'0')}`;
}
function catInfo(catId, categories){ return categories.find(c=>c.id===catId) || categories[categories.length-1]; }

// Lokale, dauerhafte Speicherung im Browser (funktioniert auch als Datei / auf GitHub Pages).
const KB_PREFIX = 'kassenbuch:';
async function storageGet(key){
  try{ const v = localStorage.getItem(KB_PREFIX+key); return v ? JSON.parse(v) : null; }
  catch(e){ return null; }
}
async function storageSet(key,val){
  try{ localStorage.setItem(KB_PREFIX+key, JSON.stringify(val)); }
  catch(e){ console.error('Speichern fehlgeschlagen', e); alert('Speichern fehlgeschlagen — evtl. ist der Speicher voll oder privat/Inkognito aktiv.'); }
}
function storageList(prefix){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);

// ---------- Backup: Sichern / Laden ----------
function exportBackup(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k && k.startsWith(KB_PREFIX)) data[k.slice(KB_PREFIX.length)] = localStorage.getItem(k);
  }
  const payload={ _type:'kassenbuch-backup', _version:2, _date:new Date().toISOString(), data };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`kassenbuch-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importBackup(file){
  const reader=new FileReader();
  reader.onload=async ()=>{
    try{
      const parsed=JSON.parse(reader.result);
      const data = parsed && parsed.data ? parsed.data : parsed;
      if(!data || typeof data!=='object') throw new Error('Kein gültiges Backup.');
      if(!confirm('Backup einspielen? Die aktuellen Daten in diesem Browser werden ersetzt.')) return;
      Object.keys(data).forEach(k=>{ if(k.startsWith('settings')||k.startsWith('month:')) localStorage.setItem(KB_PREFIX+k, data[k]); });
      await init();
    }catch(e){ alert('Import fehlgeschlagen: '+e.message); }
  };
  reader.readAsText(file);
}

// Geglätteter Monatsbetrag (Quartal/Jahr auf den Monat umgelegt)
function fcMonthly(fc){
  const amt=Number(fc.amount||0), iv=fc.interval||'monat';
  return iv==='jahr' ? amt/12 : iv==='quartal' ? amt/3 : amt;
}
// Tatsächlich in diesem Monat fällig (echter Kontoabgang)
function fcDueThisMonth(fc, monthKey){
  const iv=fc.interval||'monat', amt=Number(fc.amount||0);
  if(iv==='monat') return amt;
  const m=Number(monthKey.split('-')[1]);
  const anchor=Number(fc.anchor||1);
  if(iv==='jahr') return m===anchor ? amt : 0;
  return ((m-anchor)%3+3)%3===0 ? amt : 0; // Quartal: anchor, +3, +6, +9
}
// Alt-Daten (nur Monatsbetrag + Notiz) einmalig auf Intervalle heben
function detectInterval(fc){
  fc.interval='monat';
  const note=fc.note||'';
  const parseNum=s=>parseFloat(String(s).replace(/\./g,'').replace(',','.'));
  const mQ=note.match(/([\d.,]+)\s*€\s*\/\s*Quartal/i);
  const mJ=note.match(/([\d.,]+)\s*€\s*\/\s*Jahr/i);
  if(mQ){ fc.interval='quartal'; fc.amount=parseNum(mQ[1]); delete fc.note; }
  else if(mJ){ fc.interval='jahr'; fc.amount=parseNum(mJ[1]); delete fc.note; }
}

function totals(d, monthKey){
  const list = settings.fixedCosts||[];
  const incomeTotal = (d.income||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const fixedSmooth = list.reduce((s,f)=>s+fcMonthly(f),0);
  const fixedDue    = list.reduce((s,f)=>s+fcDueThisMonth(f, monthKey),0);
  const variableTotal = (d.transactions||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const expenseActual = fixedDue + variableTotal;      // echter Kassenabgang
  const expenseSmooth = fixedSmooth + variableTotal;   // planbarer Durchschnitt
  const balanceActual = incomeTotal - expenseActual;
  const balanceSmooth = incomeTotal - expenseSmooth;
  const byCat = {}; // Kategorienverteilung geglättet, damit Monate vergleichbar bleiben
  list.forEach(f=>{ byCat[f.category]=(byCat[f.category]||0)+fcMonthly(f); });
  (d.transactions||[]).forEach(t=>{ byCat[t.category]=(byCat[t.category]||0)+Number(t.amount||0); });
  return { incomeTotal, fixedSmooth, fixedDue, variableTotal, expenseActual, expenseSmooth, balanceActual, balanceSmooth, byCat };
}

async function yearSummary(){

  const accSum = type => accounts.filter(a=>a.type===type).reduce((s,a)=>s+Number(a.amount||0),0);
  const sparSum = accSum('spar');
  const depotSum = accSum('depot');
  const gewerbeSum = accSum('gewerbe');
  const totalWealth = sparSum + depotSum + gewerbeSum;
  // Notgroschen-Reichweite: wie viele Monate deckt das Sparkonto die geglätteten Fixkosten?
  const runwayMonths = t.fixedSmooth>0 ? sparSum/t.fixedSmooth : 0;
  const accountRows = ACCOUNT_TYPES.map(ty=>{
    const items = accounts.filter(a=>a.type===ty.id);
    if(!items.length) return '';
    return `
    <tr class="group-row">
      <td colspan="1"><span class="dot" style="background:${ty.color}"></span>${ty.label}</td>
      <td class="amount">${eur(accSum(ty.id))}</td><td></td>

    ${items.map(a=>`
    <tr class="row" data-kind="account" data-id="${a.id}">

      <td style="width:28px"><button class="del-btn" data-action="del-account" data-id="${a.id}">✕</button></td>
    </tr>`).join('')}`;
  }).join('');

  const surplus = Math.max(0, t.balanceSmooth);
  const notgroschenFull = sparSum >= Number(inv.ziel);
  const progPct = Math.min(100, Math.round((sparSum/Math.max(1,Number(inv.ziel)))*100));
  const splitSum = Number(inv.splitNotgroschen)+Number(inv.splitEtf)+Number(inv.splitFrei);
  const splitAmt = p => surplus * Number(p)/100;

  // Sparziele
  const MONTH_NAMES_SHORT = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  const goalRows = (settings.goals||[]).map(go=>{
    const target=Number(go.target||0), current=Number(go.current||0), monthly=Number(go.monthly||0);
    const pct = target>0 ? Math.min(100, Math.round(current/target*100)) : 0;
    const done = current>=target && target>0;
    const remaining = Math.max(0, target-current);
    const monthsLeft = done ? 0 : (monthly>0 ? Math.ceil(remaining/monthly) : null);
    let eta='';
    if(done){ eta='<b class="due-now">erreicht ✓</b>'; }
    else if(monthsLeft===null){ eta='noch keine Sparrate gesetzt'; }
    else {
      const d=new Date(); d.setMonth(d.getMonth()+monthsLeft);
      eta=`noch ${eur(remaining)} · ${monthsLeft} Mon. (${MONTH_NAMES_SHORT[d.getMonth()]} ${d.getFullYear()})`;
    }
    return `
    <div class="goal" data-kind="goal" data-id="${go.id}">
      <div class="goal-head">
        <input type="text" class="goal-name" value="${escAttr(go.label)}" data-field="label">
        <span class="goal-pct">${pct}&nbsp;%</span>
        <button class="del-btn" data-action="del-goal" data-id="${go.id}">✕</button>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${done?'var(--pos)':'var(--gold)'}"></div></div>
      <div class="goal-meta">
        <input type="number" step="50" class="inline-num" value="${current}" data-field="current"> /
        <input type="number" step="50" class="inline-num" value="${target}" data-field="target"> € ·
        <input type="number" step="10" class="inline-num" style="width:58px" value="${monthly}" data-field="monthly"> €/Mon · ${eta}
      </div>
    </div>`;
  }).join('');
  const goalsMonthlySum = (settings.goals||[]).filter(g=>Number(g.current||0)<Number(g.target||0)).reduce((s,g)=>s+Number(g.monthly||0),0);

  // Jahresübersicht
  const ys = await yearSummary();
  const ysRate = ys.inc>0 ? Math.round(ys.save/ys.inc*100) : 0;

  // Finanz-Check (Ampel)
  const GREEN='var(--pos)', YELLOW='var(--gold)', RED='var(--neg)';
  const checks = [
    (()=>{ const v=fairRateA; return {label:'Sparquote (fair)', color: v>=15?GREEN:(v>=8?YELLOW:RED),
      txt: v>=15?`${v}% — stark`:(v>=8?`${v}% — okay, Luft nach oben`:`${v}% — zu niedrig`) }; })(),
    (()=>{ const v=runwayMonths; return {label:'Notgroschen', color: v>=4?GREEN:(v>=2?YELLOW:RED),
      txt: v>=4?`${v.toFixed(1)} Monate — gut abgesichert`:(v>=2?`${v.toFixed(1)} Monate — weiter auffüllen`:`${v.toFixed(1)} Monate — knapp`) }; })(),
    (()=>{ const v=t.balanceSmooth; return {label:'Monatsbilanz', color: v>0?GREEN:RED,
      txt: v>0?`+${eur(v)} planbar übrig`:`${eur(v)} — Ausgaben ≥ Einnahmen` }; })(),
  ];
  if(budgetCats.length){
    checks.push({label:'Budgets', color: anyOverBudget?RED:(anyNearBudget?YELLOW:GREEN),
      txt: anyOverBudget?'ein Limit überschritten':(anyNearBudget?'ein Limit fast erreicht':'alle im Rahmen')});
  }
  const checkRows = checks.map(c=>`
    <div class="check-row">
      <span class="check-dot" style="background:${c.color}"></span>
      <span class="check-label">${c.label}</span>
      <span class="check-txt">${c.txt}</span>
    </div>`).join('');

  app.innerHTML = `

          <button data-action="next-month">›</button>

      <div class="biz-flow" style="border-top:none;padding-top:2px;">

          <span class="amount-txt">${eur(incA)}</span></div>
        <div class="biz-line"><span>Netto <input type="text" class="name-inline" value="${escAttr(pName)}" data-household="partnerName"></span>
          <span class="amount-txt"><input type="number" step="10" class="inline-num" style="width:88px" value="${incB}" data-household="incomeB"> €</span></div>
        <div class="biz-line result"><span>Zusammen</span><span class="amount-txt">${eur(incTotal)}</span></div>
      </div>

      ${hasB ? `
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" style="width:${Math.round(shareApct*100)}%;background:#5C7A99"></div></div>
        <div class="prog-meta"><span>Ich ${Math.round(shareApct*100)}&nbsp;%</span><span>${escHtml(pName)} ${Math.round(shareBpct*100)}&nbsp;%</span></div>
      </div>` : `<div class="split-hint">Trag ${escHtml(pName)}s Netto ein — dann rechne ich die faire Quote aus. Bis dahin gilt 50/50. (${escHtml(pName)} überweist dir aktuell ${eur(partnerTransfer)} als Anteil.)</div>`}

      <div style="margin-top:12px;">

      <div class="pair-grid">
        <span></span><span class="h">Ich</span><span class="h">${escHtml(pName)}</span>
        <span>Einkommen</span><span class="v">${eur(incA)}</span><span class="v">${eur(incB)}</span>
        <span>− Anteil gemeinsam</span><span class="v">${eur(fairA)}</span><span class="v">${eur(fairB)}</span>
        <span>− Private Fixkosten</span><span class="v">${eur(privA)}</span><span class="v">${eur(privB)}</span>

        <span class="tot">Bleibt frei</span><span class="v tot ${restA>=0?'':'neg'}">${eur(restA)}</span><span class="v tot ${restB>=0?'':'neg'}">${eur(restB)}</span>
      </div>
      <div class="split-hint">Deine faire Sparquote: <b>${fairRateA}&nbsp;%</b>${hasB?` · Haushalt zusammen: <b>${hhRate}&nbsp;%</b>`:''}. Faires Ziel: beiden bleibt anteilig etwa gleich viel Luft. ${escHtml(pName)}s private Posten kannst du oben mit „Privat → ${escHtml(pName)}" erfassen.</div>
    </div>

      <table><tbody>${accountRows}
        <tr class="sum-row"><td>Gesamtvermögen</td><td class="amount">${eur(totalWealth)}</td><td></td></tr>
      </tbody></table>
      <div class="addline acc">
        <input type="text" id="new-acc-label" placeholder="Kontoname">
        <select id="new-acc-type">
          ${ACCOUNT_TYPES.map(ty=>`<option value="${ty.id}">${ty.label}</option>`).join('')}

        <input type="number" step="0.01" id="new-acc-amount" placeholder="Stand €">

      <div class="split-hint">Dein Notgroschen (${eur(sparSum)}) reicht für <b>${runwayMonths.toFixed(1)} Monate</b> Fixkosten. ${runwayMonths<3?'Unter 3 Monaten — mit Kind unterwegs würde ich das priorisiert auffüllen.':runwayMonths<4?'Solide; mit zweitem Kind sind 4–6 Monate ein gutes Ziel.':'Gut abgesichert.'}</div>

      ${goalsMonthlySum>0 ? `<div class="split-hint">Summe deiner aktiven Sparraten: <b>${eur(goalsMonthlySum)}/Monat</b>. ${goalsMonthlySum > Math.max(0,t.balanceSmooth) ? `Das ist mehr als dein planbarer Überschuss (${eur(Math.max(0,t.balanceSmooth))}) — Ziele oder Raten anpassen.` : `Passt in deinen planbaren Überschuss von ${eur(Math.max(0,t.balanceSmooth))}.`}</div>`:''}

        <span>Kleingewerbe-Umsatz</span><span class="v">${eur(biz.total)}</span>
        <span class="tot">Gespart ${year}</span><span class="v tot ${ys.save>=0?'pos':'neg'}">${eur(ys.save)}</span>
        <span>Sparquote Jahr</span><span class="v ${ysRate>=15?'pos':''}">${ysRate}&nbsp;%</span>
      </div>
    </div>

    <details class="settings" data-tab="auswertung">
      <summary>Kategorien verwalten</summary>
      <div class="card">
        <table><tbody>
        ${settings.categories.map(c=>`
          <tr class="row" data-kind="category" data-id="${c.id}">
            <td class="name-cell"><input type="text" value="${escAttr(c.label)}" data-field="label"></td>
            <td style="width:118px;text-align:right;"><span class="note" style="display:inline">Limit </span><input type="number" step="10" class="inline-num" value="${Number(c.budget||0)}" data-field="budget"> €</td>
            <td style="width:44px"><input type="color" value="${c.color}" data-field="color" style="width:36px;height:26px;border:none;background:none;padding:0;"></td>
          </tr>`).join('')}
        </tbody></table>
        <div class="hint" style="margin-top:6px;">Limit = monatliches Budget für variable Ausgaben in dieser Kategorie. 0 = kein Limit.</div>
        <div class="addline" style="grid-template-columns:1fr 60px 32px;margin-top:12px;">
          <input type="text" id="new-cat-label" placeholder="Neue Kategorie">
          <input type="color" id="new-cat-color" value="#8B94A3" style="height:28px;border:none;padding:0;">
          <button data-action="add-cat">+</button>
        </div>
      </div>
    </details>
  `;
  app.setAttribute('data-active-tab', activeTab);
}

function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// ---------- Event delegation ----------
document.addEventListener('click', async (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action==='prev-month'){ await loadMonth(shiftMonth(currentMonthKey,-1)); await loadHistory(); render(); return; }
  if(action==='next-month'){ await loadMonth(shiftMonth(currentMonthKey,1)); await loadHistory(); render(); return; }

  if(action==='switch-tab'){
    activeTab = btn.dataset.tabId;
    try{ localStorage.setItem('kassenbuch:ui:tab', activeTab); }catch(e){}
    render();
    window.scrollTo({top:0});
    return;
  }
  if(action==='toggle-group'){
    const cat=btn.dataset.cat;
    expandedGroups.has(cat) ? expandedGroups.delete(cat) : expandedGroups.add(cat);
    render(); return;
  }
  if(action==='toggle-all-groups'){
    if(expandedGroups.size>0){ expandedGroups.clear(); }
    else { settings.fixedCosts.forEach(f=>expandedGroups.add(f.category)); }
    render(); return;
  }
  if(action==='export-backup'){ exportBackup(); return; }
  if(action==='import-backup'){ document.getElementById('import-file').click(); return; }

  if(action==='add-income'){
    monthData.income.push({id:uid(), label:'Neue Einnahme', amount:0, person:'ich'});
    await storageSet(`month:${currentMonthKey}`, monthData); await loadHistory(); render(); return;
  }
  if(action==='del-income'){
    monthData.income = monthData.income.filter(i=>i.id!==btn.dataset.id);
    await storageSet(`month:${currentMonthKey}`, monthData); await loadHistory(); render(); return;
  }

  if(action==='add-fixed'){
    settings.fixedCosts.push({id:uid(), label:'Neuer Posten', category:'sonstiges', amount:0, interval:'monat', anchor:1, scope:'gemeinsam', who:'ich'});
    expandedGroups.add('sonstiges');
    await storageSet('settings', settings); render(); return;
  }
  if(action==='del-fixed'){
    settings.fixedCosts = settings.fixedCosts.filter(f=>f.id!==btn.dataset.id);
    await storageSet('settings', settings); await loadHistory(); render(); return;
  }

  if(action==='add-tx'){
    const date = document.getElementById('new-tx-date').value;
    const label = document.getElementById('new-tx-label').value.trim() || 'Ausgabe';
    const category = document.getElementById('new-tx-cat').value;
    const amount = parseFloat(document.getElementById('new-tx-amount').value) || 0;
    monthData.transactions.push({id:uid(), date, label, category, amount});
    await storageSet(`month:${currentMonthKey}`, monthData); await loadHistory(); render(); return;
  }
  if(action==='del-tx'){
    monthData.transactions = monthData.transactions.filter(t=>t.id!==btn.dataset.id);
    await storageSet(`month:${currentMonthKey}`, monthData); await loadHistory(); render(); return;
  }

  if(action==='add-biz'){
    monthData.business = monthData.business || [];
    monthData.business.push({id:uid(), date:new Date().toISOString().slice(0,10), label:'Auftrag', amount:0});
    await storageSet(`month:${currentMonthKey}`, monthData); render(); return;
  }
  if(action==='del-biz'){
    monthData.business = (monthData.business||[]).filter(b=>b.id!==btn.dataset.id);
    await storageSet(`month:${currentMonthKey}`, monthData); render(); return;
  }

  if(action==='add-account-line'){
    const label = document.getElementById('new-acc-label').value.trim() || 'Konto';
    const type = document.getElementById('new-acc-type').value;
    const amount = parseFloat(document.getElementById('new-acc-amount').value) || 0;
    settings.accounts = settings.accounts || [];
    settings.accounts.push({id:uid(), label, type, amount});
    await storageSet('settings', settings); render(); return;
  }
  if(action==='del-account'){
    settings.accounts = (settings.accounts||[]).filter(a=>a.id!==btn.dataset.id);
    await storageSet('settings', settings); render(); return;
  }

  if(action==='add-goal'){
    settings.goals = settings.goals || [];
    settings.goals.push({id:uid(), label:'Neues Ziel', target:1000, current:0, monthly:100});
    await storageSet('settings', settings); render(); return;
  }
  if(action==='del-goal'){
    settings.goals = (settings.goals||[]).filter(g=>g.id!==btn.dataset.id);
    await storageSet('settings', settings); render(); return;
  }

  if(action==='add-cat'){
    const label = document.getElementById('new-cat-label').value.trim();
    const color = document.getElementById('new-cat-color').value;
    if(label){
      settings.categories.push({id:uid(), label, color, budget:0});
      await storageSet('settings', settings); render();
    }
    return;
  }
});

document.addEventListener('change', async (e)=>{
  if(e.target.id==='import-file'){
    if(e.target.files && e.target.files[0]) importBackup(e.target.files[0]);
    e.target.value=''; return;
  }
  // Paar-Aufteilung: Einkommen & Partnername
  const hhCell = e.target.closest('[data-household]');
  if(hhCell){
    const key = hhCell.dataset.household;
    settings.household = settings.household || {};
    settings.household[key] = (key==='partnerName') ? hhCell.value : (parseFloat(hhCell.value)||0);
    await storageSet('settings', settings);
    render();
    return;
  }
  // Einstellungen der Karten "Überschuss verteilen" & "Kleinunternehmen"
  const investCell = e.target.closest('[data-invest]');
  if(investCell){
    const key = investCell.dataset.invest;
    const value = parseFloat(investCell.value)||0;
    if(key==='bizTaxRate'){ settings.bizTaxRate = value; }
    else { settings.invest[key] = value; }
    await storageSet('settings', settings);
    render();
    return;
  }

  const cell = e.target.closest('[data-field]');
  if(!cell) return;
  const row = e.target.closest('[data-kind]');
  if(!row) return;
  const kind = row.dataset.kind, id = row.dataset.id, field = cell.dataset.field;
  let value = cell.value;
  if(field==='amount') value = parseFloat(value)||0;
  if(field==='anchor') value = parseInt(value)||1;
  if(field==='target'||field==='current'||field==='monthly') value = parseFloat(value)||0;
  if(field==='budget') value = parseFloat(value)||0;

  if(kind==='income'){
    const item = monthData.income.find(i=>i.id===id); if(item){ item[field]=value; await storageSet(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='fixed'){
    const item = settings.fixedCosts.find(f=>f.id===id); if(item){ item[field]=value; await storageSet('settings', settings); }
  } else if(kind==='tx'){
    const item = monthData.transactions.find(t=>t.id===id); if(item){ item[field]=value; await storageSet(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='biz'){
    const item = (monthData.business||[]).find(b=>b.id===id); if(item){ item[field]=value; await storageSet(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='account'){
    const item = (settings.accounts||[]).find(a=>a.id===id); if(item){ item[field]=value; await storageSet('settings', settings); }
  } else if(kind==='category'){
    const item = settings.categories.find(c=>c.id===id); if(item){ item[field]=value; await storageSet('settings', settings); }
  } else if(kind==='goal'){
    const item = (settings.goals||[]).find(g=>g.id===id); if(item){ item[field]=value; await storageSet('settings', settings); }
  }
  await loadHistory();
  render();
});

init();
</script>
