<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kassenbuch</title>
<meta name="theme-color" content="#10141A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kassenbuch">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10141A;
    --panel:#1A2029;
    --panel-alt:#212934;
    --paper:#ECE6D6;
    --ink:#D8DCE2;
    --muted:#8B94A3;
    --pos:#4E9C7C;
    --neg:#B5533C;
    --gold:#C9A227;
    --line:#2A323D;
    --radius:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--bg);}
  body{
    margin:0;
    background:
      radial-gradient(1100px 500px at 50% -180px, rgba(201,162,39,0.07), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-top:env(safe-area-inset-top);
  }
  .wrap{
    max-width:760px;margin:0 auto;
    padding:20px 16px calc(64px + env(safe-area-inset-bottom));
  }
  h1,h2,h3{font-family:'Fraunces', serif;font-weight:600;margin:0;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
  .topbar h1{font-size:22px;}
  .topbar .sub{font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--muted);}

  /* ---------- Monatsbeleg (Hero-Ticket) ---------- */
  .ticket{
    background:linear-gradient(180deg, #1C232D 0%, var(--panel) 100%);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 22px 0;
    position:relative;
    box-shadow:0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 30px -18px rgba(0,0,0,0.8);
  }
  .ticket-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1;
  }
  .month-nav button:active{border-color:var(--gold);transform:scale(0.96);}
  .month-nav .month-label{font-family:'Fraunces',serif;font-size:18px;min-width:132px;text-align:center;}
  .today-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
    padding:5px 9px;border-radius:20px;cursor:pointer;
  }
  .today-btn:active{color:var(--gold);border-color:var(--gold);}

  .hero-grid{
    display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
    padding:10px 0 18px;
  }
  .hero-balance .eyebrow{margin-bottom:4px;}
  .hero-balance .big{
    font-family:'IBM Plex Mono',monospace;font-size:38px;font-weight:600;letter-spacing:-0.5px;line-height:1.05;
  }
  .hero-balance .big.pos{color:var(--pos);}
  .hero-balance .big.neg{color:var(--neg);}
  .hero-subfigs{display:flex;gap:16px;margin-top:12px;}
  .hero-subfigs .sf .eyebrow{font-size:10px;margin-bottom:2px;}
  .hero-subfigs .sf .num{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:500;}
  .ring-wrap{text-align:center;}
  .ring-wrap svg{display:block;}
  .ring-bg{stroke:var(--panel-alt);}
  .ring-fg{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
  .ring-fg.neg{stroke:var(--neg);}
  .ring-txt{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;fill:var(--ink);}
  .ring-lbl{font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:0.1em;fill:var(--muted);text-transform:uppercase;}
  .perf{
    height:14px;margin:0 -22px;
    background: radial-gradient(circle at 7px 7px, var(--bg) 7px, transparent 7.5px) repeat-x;
    background-size:16px 14px;
  }
  .streak-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;
    border:1px solid var(--line);border-radius:20px;padding:5px 11px;color:var(--muted);
    background:var(--panel);
  }
  .badge b{color:var(--gold);font-weight:600;}
  .badge.hot{border-color:rgba(201,162,39,0.5);color:var(--ink);}

  /* ---------- Karten ---------- */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-top:16px;}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
  .card-head h2{font-size:16px;}
  .hint{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
  .add-btn{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    padding:8px 13px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;
  }
  .add-btn:active{border-color:var(--gold);}

  table{width:100%;border-collapse:collapse;}
  tr.row{border-top:1px solid var(--line);}
  tr.row:first-child{border-top:none;}
  td{padding:9px 4px;vertical-align:middle;}
  td.amount{font-family:'IBM Plex Mono',monospace;text-align:right;white-space:nowrap;}
  td.name-cell input, td.amount input, .addline input, .addline select{
    background:transparent;border:none;color:var(--ink);font-family:inherit;font-size:13.5px;
    width:100%;padding:6px 2px;border-radius:6px;
  }
  td.name-cell input:focus, td.amount input:focus{background:var(--panel-alt);outline:1px solid var(--gold);}
  .note{font-size:11px;color:var(--muted);display:block;}
  .del-btn{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:6px 8px;
  }
  .del-btn:active{color:var(--neg);}
  .sum-row td{padding-top:12px;border-top:1px solid var(--line);font-weight:600;}

  .addline{
    display:grid;grid-template-columns:100px 1fr 130px 90px 36px;gap:6px;
    background:var(--panel-alt);border-radius:9px;padding:6px 8px;margin-top:10px;align-items:center;
  }
  .addline select{cursor:pointer;}
  .addline button{
    background:var(--gold);border:none;color:#1A1503;font-weight:600;border-radius:7px;
    height:34px;cursor:pointer;font-size:15px;
  }
  .addline.acc{grid-template-columns:1fr 150px 90px 36px;}
  @media(max-width:520px){
    .addline, .addline.acc{grid-template-columns:1fr 1fr;}
    .addline button{grid-column:span 2;}
  }

  /* ---------- Kategorien: Donut + Balken ---------- */
  .cat-layout{display:grid;grid-template-columns:150px 1fr;gap:18px;align-items:center;}
  @media(max-width:560px){.cat-layout{grid-template-columns:1fr;justify-items:center;}}
  .donut{width:140px;height:140px;}
  .donut-big{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;fill:var(--ink);}
  .donut-sub{font-family:'IBM Plex Mono',monospace;font-size:7.5px;letter-spacing:0.1em;fill:var(--muted);text-transform:uppercase;}
  .catbars{width:100%;}
  .catbar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px;}
  .catbar-row .label{width:132px;flex-shrink:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .catbar-track{flex:1;height:8px;background:var(--panel-alt);border-radius:6px;overflow:hidden;}
  .catbar-fill{height:100%;border-radius:6px;transition:width .5s ease;}
  .catbar-row .val{font-family:'IBM Plex Mono',monospace;width:76px;text-align:right;flex-shrink:0;}

  /* ---------- Verlauf ---------- */
  .trend{display:flex;align-items:flex-end;gap:10px;height:130px;margin-top:14px;}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .trend .v-label{font-size:9.5px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-bottom:4px;white-space:nowrap;}
  .trend .bar{width:62%;border-radius:5px 5px 0 0;min-height:2px;transition:height .5s ease;}
  .trend .col.now .bar{outline:1px solid rgba(201,162,39,0.55);outline-offset:1px;}
  .trend .m-label{font-size:10px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace;}
  .trend .col.now .m-label{color:var(--gold);}

  .callout{
    border:1px solid var(--gold);border-radius:9px;padding:12px 14px;margin-top:14px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .callout .t{font-size:13px;}
  .callout .t b{color:var(--gold);}
  .callout .figs{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);}

  details.settings{margin-top:22px;}
  details.settings summary{cursor:pointer;color:var(--muted);font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.05em;padding:6px 0;}
  details.settings .card{margin-top:10px;}
  .backup-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

  ::selection{background:var(--gold);color:#1A1503;}
  a{color:var(--gold);}
  button:focus-visible, input:focus-visible, select:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}

  /* Gruppierte Fixkosten */
  tr.group-row td{
    padding:12px 4px 5px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--muted);
  }
  tr.group-row td.amount{font-size:12px;color:var(--ink);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:1px;flex-shrink:0;}

  /* Kleinunternehmen */
  .biz-flow{margin-top:14px;border-top:1px solid var(--line);padding-top:12px;}
  .biz-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13.5px;gap:8px;flex-wrap:wrap;}
  .biz-line .amount-txt{font-family:'IBM Plex Mono',monospace;}
  .biz-line.result{border-top:1px solid var(--line);margin-top:6px;padding-top:10px;font-weight:600;}
  .biz-line.result .amount-txt{color:var(--gold);font-size:16px;}
  .inline-num{
    background:var(--panel-alt);border:1px solid var(--line);color:var(--ink);
    width:56px;padding:4px 6px;border-radius:6px;font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;text-align:right;
  }
  .inline-num:focus{outline:1px solid var(--gold);}

  /* Überschuss verteilen / Notgroschen */
  .prog-wrap{margin:12px 0 4px;}
  .prog-track{height:12px;background:var(--panel-alt);border-radius:7px;overflow:hidden;position:relative;}
  .prog-fill{
    height:100%;border-radius:7px;transition:width .6s ease;
    background:linear-gradient(90deg, #3C7A61, var(--pos));
  }
  .prog-fill.full{background:linear-gradient(90deg, #A8871F, var(--gold));}
  .prog-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace;flex-wrap:wrap;gap:4px;}
  .split-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px;gap:8px;}
  .split-row:first-of-type{border-top:none;}
  .split-row .left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .split-row .euro{font-family:'IBM Plex Mono',monospace;font-weight:600;white-space:nowrap;}
  .split-hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5;}
  .split-hint b{color:var(--gold);font-weight:600;}

  /* Toast */
  #toast{
    position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--panel-alt);border:1px solid var(--gold);color:var(--ink);
    padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;z-index:50;max-width:90vw;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    table, tbody{display:block;width:100%;}
    tbody tr{display:grid;align-items:center;column-gap:6px;}
    tbody td{display:block;width:auto !important;padding:3px 2px;}
    tr[data-kind="fixed"]{grid-template-columns:1fr 96px 32px;}
    tr[data-kind="fixed"] td.name-cell{grid-column:1 / -1;}
    tr[data-kind="tx"]{grid-template-columns:112px 1fr 96px 32px;}
    tr[data-kind="tx"] td.name-cell{grid-column:2 / -1;}
    tr[data-kind="tx"] td.amount{grid-column:3;}
    tr[data-kind="income"], tr[data-kind="account"], tr.group-row, tr.sum-row{grid-template-columns:1fr 96px 32px;}
    tr[data-kind="biz"]{grid-template-columns:112px 1fr 96px 32px;}
    td select{font-size:12px;}
    tr.row{padding:5px 0;}
    .hero-balance .big{font-size:32px;}
  }

  .fade-in{animation:fadeIn .35s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important;} }
</style>
</head>
<body>
<div class="wrap" id="app">Lade…</div>
<div id="toast"></div>

<script>
// =====================================================================
//  Speicher: localStorage (funktioniert offline & auf GitHub Pages)
// =====================================================================
const NS = 'kassenbuch:';
const store = {
  get(key){
    try{ const v = localStorage.getItem(NS+key); return v ? JSON.parse(v) : null; }
    catch(e){ return null; }
  },
  set(key,val){
    try{ localStorage.setItem(NS+key, JSON.stringify(val)); return true; }
    catch(e){ showToast('Speichern fehlgeschlagen — Speicher voll?'); return false; }
  },
  list(prefix){
    const keys=[];
    try{
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(k && k.startsWith(NS+prefix)) keys.push(k.slice(NS.length));
      }
    }catch(e){}
    return keys;
  }
};

let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'), 2600);
}

// =====================================================================
//  Defaults
// =====================================================================
const CATEGORY_DEFAULTS = [
  {id:'wohnen', label:'Wohnen', color:'#5C7A99'},
  {id:'versicherung', label:'Versicherung', color:'#7A6C9E'},
  {id:'auto', label:'Auto', color:'#4F7A8C'},
  {id:'freizeit', label:'Freizeit', color:'#C9A227'},
  {id:'trading', label:'Trading/Datenfeed', color:'#4E9C7C'},
  {id:'challenge', label:'Challenges', color:'#B5533C'},
  {id:'spontan', label:'Kleinausgaben/Spontan', color:'#D08A52'},
  {id:'sonstiges', label:'Sonstiges', color:'#8B94A3'}
];

function defaultFixedCosts(){
  return [
    {id:uid(), label:'Miete', category:'wohnen', amount:1300},
    {id:uid(), label:'Private Krankenversicherung (inkl. Dienstunfähigkeit)', category:'versicherung', amount:501},
    {id:uid(), label:'Leasing Auto', category:'auto', amount:430},
    {id:uid(), label:'Haushaltskonto', category:'wohnen', amount:650},
    {id:uid(), label:'Strom', category:'wohnen', amount:45},
    {id:uid(), label:'Unfallversicherung', category:'versicherung', amount:24},
    {id:uid(), label:'Rundfunkbeitrag', category:'wohnen', amount:18.33, note:'55 € / Quartal'},
    {id:uid(), label:'Privathaftpflicht', category:'versicherung', amount:6.5, note:'78 € / Jahr'},
    {id:uid(), label:'Rechtsschutzversicherung', category:'versicherung', amount:13.40, note:'160,75 € / Jahr'},
    {id:uid(), label:'Hausratversicherung', category:'versicherung', amount:14.17, note:'170 € / Jahr'},
    {id:uid(), label:'CrossFit', category:'freizeit', amount:135},
    {id:uid(), label:'Trainingsprogramm', category:'freizeit', amount:33.33, note:'100 € / Quartal'},
    {id:uid(), label:'Datafeed Trading', category:'trading', amount:42, note:'~46 $ / Monat'},
    {id:uid(), label:'Sky TV', category:'freizeit', amount:53},
    {id:uid(), label:'Netflix', category:'freizeit', amount:5},
    {id:uid(), label:'YouTube Premium', category:'freizeit', amount:22},
    {id:uid(), label:'Cloud', category:'freizeit', amount:3},
    {id:uid(), label:'Anschaffungen & Urlaub', category:'sonstiges', amount:200},
    {id:uid(), label:'Sprit', category:'auto', amount:250, note:'ca. 2–300 € / Monat'},
    {id:uid(), label:'Autowartung', category:'auto', amount:42.50, note:'510 € / Jahr'}
  ];
}
function defaultSettings(){
  return {
    fixedCosts: defaultFixedCosts(),
    categories: CATEGORY_DEFAULTS,
    bizTaxRate: 40,
    invest: { ziel: 12000, stand: 0, splitNotgroschen: 50, splitEtf: 40, splitFrei: 10 }
  };
}
function defaultMonth(){
  return {
    income:[
      {id:uid(), label:'Gehalt (netto)', amount:3700},
      {id:uid(), label:'Mietanteil Sophie', amount:550}
    ],
    transactions:[],
    business:[]
  };
}

// =====================================================================
//  Helpers
// =====================================================================
function uid(){ return Math.random().toString(36).slice(2,9); }
function eur(n){ return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(n||0); }
function eurShort(n){
  const abs=Math.abs(n);
  if(abs>=1000) return (n/1000).toFixed(1).replace('.',',')+'k';
  return Math.round(n)+'€';
}
function monthLabel(key){
  const [y,m]=key.split('-').map(Number);
  const names=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return `${names[m-1]} ${y}`;
}
function shiftMonth(key,delta){
  let [y,m]=key.split('-').map(Number);
  m+=delta;
  while(m<1){m+=12;y--;}
  while(m>12){m-=12;y++;}
  return `${y}-${String(m).padStart(2,'0')}`;
}
function catInfo(catId, categories){ return categories.find(c=>c.id===catId) || categories[categories.length-1]; }
function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

// =====================================================================
//  State
// =====================================================================
let settings = null;
let currentMonthKey = null;
let monthData = null;
let history = []; // {key, balance}
let firstRender = true;

function currentMonthKeyDefault(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function init(){
  settings = store.get('settings');
  if(!settings){ settings = defaultSettings(); store.set('settings', settings); }
  // Migration: neue Felder für bestehende Daten ergänzen
  let migrated = false;
  if(settings.bizTaxRate === undefined){ settings.bizTaxRate = 40; migrated = true; }
  if(!settings.invest){ settings.invest = { ziel: 12000, stand: 0, splitNotgroschen: 50, splitEtf: 40, splitFrei: 10 }; migrated = true; }
  if(!settings.accounts){
    settings.accounts = [
      {id:uid(), label:'Sparkonto', type:'spar', amount: Number(settings.invest.stand)||0},
      {id:uid(), label:'Depot (ETF & Co.)', type:'depot', amount: 0},
      {id:uid(), label:'Kleingewerbe-Konto', type:'gewerbe', amount: 0}
    ];
    migrated = true;
  }
  if(migrated) store.set('settings', settings);
  currentMonthKey = currentMonthKeyDefault();
  loadMonth(currentMonthKey);
  loadHistory();
  render();
  registerSW();
}

function loadMonth(key){
  let d = store.get(`month:${key}`);
  if(!d){ d = defaultMonth(); store.set(`month:${key}`, d); }
  if(!d.business) d.business = [];
  currentMonthKey = key;
  monthData = d;
}

function loadHistory(){
  history = [];
  for(let i=5;i>=0;i--){
    const key = shiftMonth(currentMonthKey, -i);
    const d = (key===currentMonthKey) ? monthData : store.get(`month:${key}`);
    if(d){
      const t = totals(d);
      history.push({key, balance:t.balance});
    } else {
      history.push({key, balance:null});
    }
  }
}

function totals(d){
  const incomeTotal = (d.income||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const fixedTotal = (settings.fixedCosts||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const variableTotal = (d.transactions||[]).reduce((s,i)=>s+Number(i.amount||0),0);
  const expenseTotal = fixedTotal + variableTotal;
  const balance = incomeTotal - expenseTotal;
  const byCat = {};
  (settings.fixedCosts||[]).forEach(f=>{ byCat[f.category]=(byCat[f.category]||0)+Number(f.amount||0); });
  (d.transactions||[]).forEach(t=>{ byCat[t.category]=(byCat[t.category]||0)+Number(t.amount||0); });
  return { incomeTotal, fixedTotal, variableTotal, expenseTotal, balance, byCat };
}

function yearChallengeStats(){
  const year = currentMonthKey.split('-')[0];
  let count=0, total=0;
  for(const k of store.list(`month:${year}-`)){
    const d = (k===`month:${currentMonthKey}`) ? monthData : store.get(k);
    if(d){ (d.transactions||[]).forEach(t=>{ if(t.category==='challenge'){count++; total+=Number(t.amount||0);} }); }
  }
  return {count,total};
}

function yearBusinessStats(){
  const year = currentMonthKey.split('-')[0];
  let total=0;
  for(const k of store.list(`month:${year}-`)){
    const d = (k===`month:${currentMonthKey}`) ? monthData : store.get(k);
    if(d){ (d.business||[]).forEach(b=>{ total+=Number(b.amount||0); }); }
  }
  return {total};
}

// Wie viele Monate in Folge (rückwärts) mit Überschuss?
function surplusStreak(){
  let key = currentMonthKey;
  const tNow = totals(monthData);
  // Laufender Monat zählt nur, wenn er bereits im Plus ist — sonst ab Vormonat zählen
  if(tNow.balance <= 0) key = shiftMonth(key,-1);
  let streak = 0;
  for(let i=0;i<36;i++){
    const d = (key===currentMonthKey) ? monthData : store.get(`month:${key}`);
    if(!d) break;
    if(totals(d).balance > 0){ streak++; key = shiftMonth(key,-1); }
    else break;
  }
  return streak;
}

// =====================================================================
//  SVG-Bausteine
// =====================================================================
function ringSVG(pct, label, valueTxt, size=104){
  const r=42, c=2*Math.PI*r;
  const clamped=Math.max(0,Math.min(100,pct));
  const off=c*(1-clamped/100);
  const negClass = pct<0 ? ' neg':'';
  return `<svg width="${size}" height="${size}" viewBox="0 0 104 104" role="img" aria-label="${label} ${valueTxt}">
    <circle class="ring-bg" cx="52" cy="52" r="${r}" fill="none" stroke-width="9"/>
    <circle class="ring-fg${negClass}" cx="52" cy="52" r="${r}" fill="none" stroke-width="9"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 52 52)"/>
    <text class="ring-txt" x="52" y="51" text-anchor="middle">${valueTxt}</text>
    <text class="ring-lbl" x="52" y="66" text-anchor="middle">${label}</text>
  </svg>`;
}

function donutSVG(byCat, categories, expenseTotal){
  const entries = Object.entries(byCat).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!entries.length || expenseTotal<=0) return '';
  const r=44, c=2*Math.PI*r;
  let off=0;
  const segs = entries.map(([id,v])=>{
    const col = catInfo(id, categories).color;
    const frac = v/expenseTotal;
    const seg = `<circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="15"
      stroke-dasharray="${Math.max(0,(frac*c)-1.5).toFixed(2)} ${c.toFixed(2)}"
      stroke-dashoffset="${(-off*c).toFixed(2)}" transform="rotate(-90 60 60)"/>`;
    off+=frac;
    return seg;
  }).join('');
  return `<svg class="donut" viewBox="0 0 120 120">
    ${segs}
    <text class="donut-big" x="60" y="58" text-anchor="middle">${eur(expenseTotal)}</text>
    <text class="donut-sub" x="60" y="72" text-anchor="middle">Ausgaben</text>
  </svg>`;
}

  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  document.querySelectorAll('[data-countup]').forEach(el=>{
    const target = parseFloat(el.dataset.countup)||0;
    const dur = 650, start = performance.now();
    function step(now){
      const p = Math.min(1,(now-start)/dur);
      const eased = 1-Math.pow(1-p,3);
      el.textContent = eur(target*eased);
      if(p<1) requestAnimationFrame(step); else el.textContent = eur(target);
    }
    requestAnimationFrame(step);
  });
}

// =====================================================================
//  Backup
// =====================================================================
function exportBackup(){
  const data = { exportedAt:new Date().toISOString(), settings:store.get('settings'), months:{} };
  store.list('month:').forEach(k=>{ data.months[k.slice(6)] = store.get(k); });
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kassenbuch-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  showToast('Backup exportiert ✓');
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.settings || !data.months) throw new Error('Format');
      store.set('settings', data.settings);
      Object.entries(data.months).forEach(([key,val])=>store.set(`month:${key}`, val));
      settings = data.settings;
      loadMonth(currentMonthKey);
      loadHistory();
      render();
      showToast('Backup eingespielt ✓');
    }catch(e){ showToast('Datei konnte nicht gelesen werden.'); }
  };
  reader.readAsText(file);
}

// =====================================================================
//  Events
// =====================================================================
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action==='prev-month'){ loadMonth(shiftMonth(currentMonthKey,-1)); loadHistory(); render(); return; }
  if(action==='next-month'){ loadMonth(shiftMonth(currentMonthKey,1)); loadHistory(); render(); return; }
  if(action==='jump-today'){ loadMonth(currentMonthKeyDefault()); loadHistory(); render(); return; }

  if(action==='add-income'){
    monthData.income.push({id:uid(), label:'Neue Einnahme', amount:0});
    store.set(`month:${currentMonthKey}`, monthData); loadHistory(); render(); return;
  }
  if(action==='del-income'){
    monthData.income = monthData.income.filter(i=>i.id!==btn.dataset.id);
    store.set(`month:${currentMonthKey}`, monthData); loadHistory(); render(); return;
  }

  if(action==='add-fixed'){
    settings.fixedCosts.push({id:uid(), label:'Neuer Posten', category:'sonstiges', amount:0});
    store.set('settings', settings); render(); return;
  }
  if(action==='del-fixed'){
    settings.fixedCosts = settings.fixedCosts.filter(f=>f.id!==btn.dataset.id);
    store.set('settings', settings); loadHistory(); render(); return;
  }

  if(action==='add-tx'){
    const date = document.getElementById('new-tx-date').value;
    const label = document.getElementById('new-tx-label').value.trim() || 'Ausgabe';
    const category = document.getElementById('new-tx-cat').value;
    const amount = parseFloat(document.getElementById('new-tx-amount').value) || 0;
    monthData.transactions.push({id:uid(), date, label, category, amount});
    store.set(`month:${currentMonthKey}`, monthData); loadHistory(); render(); return;
  }
  if(action==='del-tx'){
    monthData.transactions = monthData.transactions.filter(t=>t.id!==btn.dataset.id);
    store.set(`month:${currentMonthKey}`, monthData); loadHistory(); render(); return;
  }

  if(action==='add-biz'){
    monthData.business = monthData.business || [];
    monthData.business.push({id:uid(), date:new Date().toISOString().slice(0,10), label:'Auftrag', amount:0});
    store.set(`month:${currentMonthKey}`, monthData); render(); return;
  }
  if(action==='del-biz'){
    monthData.business = (monthData.business||[]).filter(b=>b.id!==btn.dataset.id);
    store.set(`month:${currentMonthKey}`, monthData); render(); return;
  }

  if(action==='add-account-line'){
    const label = document.getElementById('new-acc-label').value.trim() || 'Konto';
    const type = document.getElementById('new-acc-type').value;
    const amount = parseFloat(document.getElementById('new-acc-amount').value) || 0;
    settings.accounts = settings.accounts || [];
    settings.accounts.push({id:uid(), label, type, amount});
    store.set('settings', settings); render(); return;
  }
  if(action==='del-account'){
    settings.accounts = (settings.accounts||[]).filter(a=>a.id!==btn.dataset.id);
    store.set('settings', settings); render(); return;
  }

  if(action==='add-cat'){
    const label = document.getElementById('new-cat-label').value.trim();
    const color = document.getElementById('new-cat-color').value;
    if(label){
      settings.categories.push({id:uid(), label, color});
      store.set('settings', settings); render();
    }
    return;
  }

  if(action==='export-backup'){ exportBackup(); return; }
  if(action==='import-backup'){ document.getElementById('import-file').click(); return; }
});

document.addEventListener('change', (e)=>{
  if(e.target.id==='import-file' && e.target.files && e.target.files[0]){
    importBackup(e.target.files[0]);
    e.target.value='';
    return;
  }

  const investCell = e.target.closest('[data-invest]');
  if(investCell){
    const key = investCell.dataset.invest;
    const value = parseFloat(investCell.value)||0;
    if(key==='bizTaxRate'){ settings.bizTaxRate = value; }
    else { settings.invest[key] = value; }
    store.set('settings', settings);
    render();
    return;
  }

  const cell = e.target.closest('[data-field]');
  if(!cell) return;
  const row = e.target.closest('tr[data-kind]');
  if(!row) return;
  const kind = row.dataset.kind, id = row.dataset.id, field = cell.dataset.field;
  let value = cell.value;
  if(field==='amount') value = parseFloat(value)||0;

  if(kind==='income'){
    const item = monthData.income.find(i=>i.id===id); if(item){ item[field]=value; store.set(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='fixed'){
    const item = settings.fixedCosts.find(f=>f.id===id); if(item){ item[field]=value; store.set('settings', settings); }
  } else if(kind==='tx'){
    const item = monthData.transactions.find(t=>t.id===id); if(item){ item[field]=value; store.set(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='biz'){
    const item = (monthData.business||[]).find(b=>b.id===id); if(item){ item[field]=value; store.set(`month:${currentMonthKey}`, monthData); }
  } else if(kind==='account'){
    const item = (settings.accounts||[]).find(a=>a.id===id); if(item){ item[field]=value; store.set('settings', settings); }
  } else if(kind==='category'){
    const item = settings.categories.find(c=>c.id===id); if(item){ item[field]=value; store.set('settings', settings); }
  }
  loadHistory();
  render();
});

  if('serviceWorker' in navigator && location.protocol==='https:'){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
